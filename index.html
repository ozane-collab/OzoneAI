<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OzoneAI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh; 
            background-color: #131314;
            color: #e3e3e3;
            font-family: sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
        }
        .app-layout {
            display: flex;
            height: 100vh;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
        }
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0;
            overflow: hidden;
            background-color: #131314;
        }
        #chat-box {
            flex: 1;
            overflow-y: auto !important;
            display: flex !important;
            flex-direction: column !important;
            min-height: 0 !important;
            -webkit-overflow-scrolling: touch;
        }
        #welcome-message {
            margin: auto !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            text-align: center !important;
            padding: 20px !important;
        }
        .sidebar-hidden { transform: translateX(-100%); }
        .sidebar-visible { transform: translateX(0); }
        .thinking-dots::after {
            content: '.';
            animation: dots 1.5s infinite steps(4);
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }
        @media (max-width: 768px) {
            .sidebar-hidden { position: fixed; z-index: 50; }
            .sidebar-visible { position: fixed; z-index: 50; width: 280px !important; }
        }
    </style>
</head>
<body class="select-none">

    <div class="app-layout">
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/60 z-40 transition-opacity duration-300 md:hidden"></div>

        <!-- 📂 Sidebar -->
        <div id="sidebar" class="sidebar-hidden md:transform-none fixed md:static bg-[#1e1f20] flex flex-col transition-transform duration-300 h-full w-[260px] border-r border-gray-800/60 left-0 top-0 flex-shrink-0">
            <div class="p-5 border-b border-gray-800/40 flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <span class="text-base">⚡️</span>
                    <span id="sidebar-brand-text" class="text-[#00f2fe] font-semibold text-lg tracking-wide">OzoneAI Pro</span>
                </div>
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white md:hidden text-lg p-1">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="flex-1 py-4 flex flex-col gap-1 px-3 overflow-y-auto">
                <button onclick="selectMenu('chat')" id="menu-chat" class="w-full bg-[#282a2c] text-white text-[14px] py-3 px-4 rounded-xl transition flex items-center gap-3 font-medium cursor-pointer text-left">
                    <i class="fa-regular fa-comment-dots text-[#00f2fe]"></i> Chat AI
                </button>
                <button onclick="selectMenu('photo')" id="menu-photo" class="w-full text-gray-400 hover:text-white hover:bg-[#282a2c]/50 text-[14px] py-3 px-4 rounded-xl transition flex items-center gap-3 cursor-pointer text-left">
                    <i class="fa-regular fa-image text-purple-400"></i> Photo AI
                </button>
                <button onclick="selectMenu('video')" id="menu-video" class="w-full text-gray-400 hover:text-white hover:bg-[#282a2c]/50 text-[14px] py-3 px-4 rounded-xl transition flex items-center gap-3 cursor-pointer text-left mb-2">
                    <i class="fa-solid fa-clapperboard text-red-400"></i> Video Automation
                </button>
                
                <div class="border-t border-gray-800/60 my-2 pt-2 flex flex-col flex-1 min-h-0">
                    <div class="flex justify-between items-center px-3 mb-2">
                        <span class="text-[11px] text-gray-500 font-medium uppercase tracking-wider">Recent Chats</span>
                        <button onclick="clearAllHistory()" class="text-gray-600 hover:text-red-400 text-xs transition">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                    <div id="chat-history-list" class="flex flex-col gap-1 overflow-y-auto flex-1"></div>
                </div>
            </div>
        </div>

        <!-- 🖥️ Main Content -->
        <div class="main-container">
            <div class="h-14 flex items-center px-4 justify-between bg-[#131314] border-b border-b-gray-800/20 flex-shrink-0">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white text-lg p-2 rounded-full hover:bg-gray-800/50">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="text-[#00f2fe] text-sm tracking-wide flex items-center gap-1.5 font-semibold">
                        <span>⚡️</span>
                        <span id="top-branding-text">ozoneai_chat</span>
                    </div>
                </div>
                <button onclick="createNewChat()" class="text-xs bg-[#1e1f20] hover:bg-[#282a2c] text-teal-400 px-3 py-1.5 rounded-full border border-gray-800 font-medium transition flex items-center gap-1.5">
                    <i class="fa-solid fa-plus text-[10px]"></i> New Chat
                </button>
            </div>

            <!-- Chat Box -->
            <div id="chat-box" class="px-4 py-4 max-w-3xl w-full mx-auto flex flex-col gap-4"></div>

            <!-- Input Form -->
            <div class="p-4 bg-[#131314] flex-shrink-0">
                <div class="max-w-3xl mx-auto flex items-center bg-[#1e1f20] rounded-full px-3 py-2 focus-within:bg-[#28292a] transition-all border border-transparent focus-within:border-gray-800/60 shadow-lg gap-2">
                    <input type="text" id="user-input" placeholder="Message OzoneAI..." class="flex-1 bg-transparent border-none outline-none text-[#e3e3e3] placeholder-[#808082] text-[15px] py-1.5 px-3 min-w-0" autocomplete="off">
                    <button id="send-btn" onclick="sendMessage()" class="text-gray-400 hover:text-[#00f2fe] w-9 h-9 rounded-full transition flex items-center justify-center hover:bg-gray-800/40 flex-shrink-0">
                        <i class="fa-solid fa-paper-plane text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🔗 ያንተ የረንደር ሰርቨር ሊንክ
        var RENDER_BASE_URL = "https://ozoneai.onrender.com"; 

        var currentChatId = null;
        var currentMode = 'chat'; 

        window.onload = function() {
            var inputElement = document.getElementById("user-input");
            if (inputElement) {
                inputElement.onkeydown = function(e) {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        sendMessage();
                    }
                };
            }
            loadChatHistory();
            showWelcomeMessage();
            setupResponsiveSidebar();
        };

        function setupResponsiveSidebar() {
            var sidebar = document.getElementById("sidebar");
            if (!sidebar) return;
            if(window.innerWidth > 768) {
                sidebar.classList.remove("sidebar-hidden");
            } else {
                sidebar.classList.add("sidebar-hidden");
            }
        }

        function toggleSidebar() {
            var sidebar = document.getElementById("sidebar");
            var overlay = document.getElementById("sidebar-overlay");
            if (!sidebar || !overlay) return;
            if (sidebar.classList.contains("sidebar-hidden")) {
                sidebar.classList.remove("sidebar-hidden");
                if (window.innerWidth <= 768) overlay.classList.remove("hidden");
            } else {
                sidebar.classList.add("sidebar-hidden");
                if (window.innerWidth <= 768) overlay.classList.add("hidden");
            }
        }

        function showWelcomeMessage() {
            var chatBox = document.getElementById("chat-box");
            if (chatBox) {
                chatBox.innerHTML =
                     '<div id="welcome-message">' +
                        '<h1 class="font-bold mb-2 text-3xl md:text-4xl text-[#00f2fe] flex items-center justify-center gap-3">' +
                            '<span>⚡️</span><span>OzoneAI Pro</span>' +
                        '</h1>' +
                        '<h2 class="text-gray-400 font-medium text-base">How can I help you today?</h2>' +
                    '</div>';
            }
        }

        function createNewChat() {
            currentChatId = null;
            showWelcomeMessage();
            loadChatHistory();
            if(window.innerWidth <= 768) {
                document.getElementById("sidebar").classList.add("sidebar-hidden");
                document.getElementById("sidebar-overlay").classList.add("hidden");
            }
        }

        function selectMenu(menuType) {
            currentMode = menuType;
            var topText = document.getElementById("top-branding-text");
            if (topText) topText.innerText = "ozoneai_" + menuType;
            createNewChat();
        }

        function saveMessageToHistory(role, text) {
            var savedChats = localStorage.getItem("ozone_sessions");
            var sessions = savedChats ? JSON.parse(savedChats) : [];
            var msgObj = { role: role, text: text };

            if (currentChatId === null) {
                currentChatId = "chat_" + Date.now();
                sessions.unshift({
                    id: currentChatId,
                    mode: currentMode,
                    title: text.substring(0, 15) + "...",
                    messages: [msgObj]
                });
            } else {
                var s = sessions.find(x => x.id === currentChatId);
                if(s) s.messages.push(msgObj);
            }
            localStorage.setItem("ozone_sessions", JSON.stringify(sessions));
            loadChatHistory();
        }

        function loadChatHistory() {
            var historyList = document.getElementById("chat-history-list");
            if (!historyList) return;
            var savedChats = localStorage.getItem("ozone_sessions");
            historyList.innerHTML = "";
            
            if (savedChats) {
                var sessions = JSON.parse(savedChats);
                if (sessions.length > 0) {
                    sessions.forEach(function(session) {
                        var isActive = session.id === currentChatId ? "bg-[#282a2c]/60 text-white" : "text-gray-400";
                        var item = document.createElement("div");
                        item.className = "py-2 px-3 rounded-lg cursor-pointer transition flex items-center justify-between text-[13px] " + isActive;
                        item.onclick = () => openChatSession(session.id);
                        item.innerHTML = `<span class="truncate">💬 ${session.title}</span>`;
                        historyList.appendChild(item);
                    });
                    return;
                }
            }
            historyList.innerHTML = '<div class="text-xs text-gray-500 italic px-3">No history</div>';
        }

        function openChatSession(id) {
            currentChatId = id;
            var sessions = JSON.parse(localStorage.getItem("ozone_sessions") || "[]");
            var active = sessions.find(s => s.id === id);
            if (active) {
                var chatBox = document.getElementById("chat-box");
                chatBox.innerHTML = "";
                active.messages.forEach(msg => {
                    var align = msg.role === "user" ? "items-end" : "justify-start";
                    var bg = msg.role === "user" ? "bg-[#282a2c]" : "";
                    chatBox.innerHTML += 
                        `<div class="flex flex-col ${align} w-full py-1">` +
                            `<div class="${bg} text-[#e3e3e3] rounded-2xl px-4 py-2.5 text-[15px] max-w-[85%] break-words">${msg.text}</div>` +
                        `</div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
                loadChatHistory();
            }
        }

        function clearAllHistory() {
            if(confirm("Clear history?")) {
                localStorage.removeItem("ozone_sessions");
                createNewChat();
            }
        }

        function sendMessage() {
            var inputField = document.getElementById("user-input");
            var chatBox = document.getElementById("chat-box");
            var message = inputField.value.trim();
            if (message === "") return;

            var welcome = document.getElementById("welcome-message");
            if (welcome) welcome.remove();
            
            chatBox.innerHTML += `<div class="flex flex-col items-end w-full py-1"><div class="bg-[#282a2c] text-[#e3e3e3] rounded-2xl px-4 py-2.5 text-[15px] max-w-[85%] break-words">${message}</div></div>`;
            saveMessageToHistory("user", message);
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            var loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="flex justify-start w-full py-2"><div class="text-gray-400 text-xl font-bold tracking-widest thinking-dots"></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            fetch(RENDER_BASE_URL + "/chat", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, mode: currentMode, chat_id: currentChatId })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="flex justify-start w-full py-1"><div class="text-[#e3e3e3] text-[15px] leading-relaxed break-words whitespace-pre-line">${data.reply}</div></div>`;
                saveMessageToHistory("ai", data.reply);
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(err => {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="flex justify-start w-full py-1"><div class="text-red-400 text-xs">⚠️ Connection Error. Please retry.</div></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
