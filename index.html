<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>OzoneAI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. ሙሉ ስክሪን መቆለፊያ - ለሞባይል */
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 2. ቻት ቦክስ እንዲለጠጥ ማድረግ */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        /* 3. ኪቦርድ ሲመጣ የኢንፑት ባር ከታች እንዲቆይ */
        #input-area {
            padding: 10px;
            background: #111;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="chat-container" class="text-white">
        <p>OzoneAI Ready...</p>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" class="w-full p-3 bg-gray-800 text-white rounded-lg" placeholder="Message...">
        <button onclick="sendMessage()" class="mt-2 w-full bg-blue-600 p-2 text-white rounded-lg">Send</button>
    </div>
</div>

<script>
    const API_URL = "https://ozoneai.onrender.com/chat"; // ትክክለኛው ሰርቨርህ

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const chat = document.getElementById("chat-container");
        const msg = input.value;
        
        chat.innerHTML += `<p class="text-blue-400">You: ${msg}</p>`;
        input.value = "";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await response.json();
            chat.innerHTML += `<p class="text-green-400">AI: ${data.reply}</p>`;
        } catch (e) {
            chat.innerHTML += `<p class="text-red-500">System is waking up, please wait 30 seconds and try again.</p>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
