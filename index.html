<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OzoneAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #131314; color: #e3e3e3;
            font-family: sans-serif; overflow: hidden; display: flex;
        }
        .main-container { display: flex; flex-direction: column; height: 100%; width: 100%; flex: 1; min-height: 0; }
        #chat-box { display: flex !important; flex-direction: column !important; flex: 1 !important; overflow-y: auto !important; min-height: 0 !important; }
        #welcome-message { margin: auto !important; display: flex !important; flex-direction: column !important; justify-content: center !important; align-items: center !important; text-align: center !important; width: 100% !important; padding: 20px !important; box-sizing: border-box !important; }
        .sidebar-hidden { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .sidebar-visible { transform: translateX(0); opacity: 1; pointer-events: auto; }
        .thinking-dots::after { content: '.'; animation: dots 1.5s infinite steps(4); }
        @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }
        @media (max-width: 768px) { .sidebar-visible { width: 280px !important; } #welcome-message h1 { font-size: 2.2rem !important; } #welcome-message h2 { font-size: 1.1rem !important; } }
    </style>
</head>
<body class="bg-[#131314] text-[#e3e3e3] select-none relative">

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/60 z-40 transition-opacity duration-300 md:hidden"></div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar-hidden md:sidebar-visible fixed md:static bg-[#1e1f20] flex flex-col transition-all duration-300 z-50 h-full w-[260px] border-r border-gray-800/60 left-0 top-0">
        <div class="p-5 border-b border-gray-800/40 flex items-center justify-between gap-2">
            <div class="flex items-center gap-2">
                <span class="text-base">⚡️</span>
                <span class="text-[#00f2fe] font-semibold text-lg tracking-wide">OzoneAI</span>
            </div>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white md:hidden text-lg p-1">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="flex-1 py-4 flex flex-col gap-1 px-3 overflow-y-auto">
            <button onclick="selectMenu('chat')" id="menu-chat" class="w-full bg-[#282a2c] text-white text-[14px] py-3 px-4 rounded-xl transition flex items-center gap-3 font-medium cursor-pointer text-left">
                <i class="fa-regular fa-comment-dots text-[#00f2fe]"></i> Chat AI
            </button>
            <div class="border-t border-gray-800/60 my-2 pt-2 flex flex-col flex-1">
                <div class="flex justify-between items-center px-3 mb-2">
                    <span class="text-[11px] text-gray-500 font-medium uppercase tracking-wider">Recent Chats</span>
                    <button onclick="clearAllHistory()" class="text-gray-600 hover:text-red-400 text-xs transition cursor-pointer"><i class="fa-regular fa-trash-can"></i></button>
                </div>
                <div id="chat-history-list" class="flex flex-col gap-1 overflow-y-auto max-h-[220px]"></div>
            </div>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div class="main-container bg-[#131314] overflow-hidden relative">
        <div class="h-14 flex items-center px-4 justify-between bg-[#131314] border-b border-b-gray-800/20 flex-shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white text-lg cursor-pointer transition p-2 rounded-full hover:bg-gray-800/50">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="text-[#00f2fe] text-sm tracking-wide flex items-center gap-1.5 font-semibold">
                    <span>⚡️</span><span>ozoneai_chat</span>
                </div>
            </div>
            <button onclick="createNewChat()" class="text-xs bg-[#1e1f20] hover:bg-[#282a2c] text-teal-400 px-3 py-1.5 rounded-full border border-gray-800 font-medium transition cursor-pointer flex items-center gap-1.5">
                <i class="fa-solid fa-plus text-[10px]"></i> New Chat
            </button>
        </div>

        <!-- CHAT BOX -->
        <div id="chat-box" class="px-4 py-4 max-w-3xl w-full mx-auto flex-1 overflow-y-auto"></div>

        <!-- INPUT CONTAINER WITH PHOTO/VIDEO BUTTONS -->
        <div class="p-4 bg-[#131314] flex-shrink-0 pb-safe">
            <div class="max-w-3xl mx-auto flex items-center bg-[#1e1f20] rounded-full px-4 py-2 focus-within:bg-[#28292a] transition-all duration-200 border border-transparent focus-within:border-gray-800/60 shadow-lg">
                
                <!-- 📷 የፎቶ/ቪዲዮ መላኪያ በተን -->
                <button onclick="triggerMediaUpload()" class="text-gray-400 hover:text-[#00f2fe] mr-2 p-2 rounded-full hover:bg-gray-800/40 transition cursor-pointer">
                    <i class="fa-solid fa-circle-plus text-base"></i>
                </button>
                <input type="file" id="media-input" accept="image/*,video/*" class="hidden" onchange="handleMediaSelect(event)">

                <input type="text" id="user-input" placeholder="Message OzoneAI..." class="flex-1 bg-transparent border-none outline-none text-[#e3e3e3] placeholder-[#808082] text-[15px] py-1.5 px-1" autocomplete="off">
                
                <button id="send-btn" onclick="sendMessage()" class="text-gray-400 hover:text-[#00f2fe] w-9 h-9 rounded-full transition flex items-center justify-center cursor-pointer hover:bg-gray-800/40 ml-1">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
            </div>
            <!-- የተመረጠ ሚዲያ ማሳያ ቅድመ እይታ (Preview) -->
            <div id="media-preview" class="max-w-3xl mx-auto mt-2 hidden flex items-center gap-2 p-2 bg-[#1e1f20] rounded-xl w-fit"></div>
        </div>
    </div>

    <script>
        var RENDER_BASE_URL = "https://ozoneai.onrender.com"; 
        var currentChatId = null;
        var selectedMediaBase64 = null;
        var selectedMediaType = null;

        window.onload = function() {
            var inputElement = document.getElementById("user-input");
            if (inputElement) {
                inputElement.onkeydown = function(event) {
                    if (event.key === "Enter") { sendMessage(); }
                };
            }
            loadChatHistory();
            showWelcomeMessage();
            setupResponsiveSidebar();
            fetch(RENDER_BASE_URL + "/").catch(function(e){});
        };

        function setupResponsiveSidebar() {
            var sidebar = document.getElementById("sidebar");
            if (!sidebar) return;
            if(window.innerWidth > 768) { sidebar.classList.remove("sidebar-hidden"); sidebar.classList.add("sidebar-visible"); }
            else { sidebar.classList.remove("sidebar-visible"); sidebar.classList.add("sidebar-hidden"); }
        }

        function toggleSidebar() {
            var sidebar = document.getElementById("sidebar");
            var overlay = document.getElementById("sidebar-overlay");
            if (sidebar.classList.contains("sidebar-hidden")) {
                sidebar.classList.remove("sidebar-hidden"); sidebar.classList.add("sidebar-visible");
                if (window.innerWidth <= 768) overlay.classList.remove("hidden");
            } else {
                sidebar.classList.remove("sidebar-visible"); sidebar.classList.add("sidebar-hidden");
                if (window.innerWidth <= 768) overlay.classList.add("hidden");
            }
        }

        function showWelcomeMessage() {
            var chatBox = document.getElementById("chat-box");
            if (chatBox) {
                chatBox.innerHTML =
                     '<div id="welcome-message">' +
                        '<h1 style="color: #00f2fe; font-weight: bold; margin-bottom: 10px; font-size: 2.3rem;">⚡️ OzoneAI</h1>' +
                        '<h2 style="color: rgba(227, 227, 227, 0.8); font-weight: 500; font-size: 1.3rem;">How can I help you today?</h2>' +
                    '</div>';
            }
        }

        function triggerMediaUpload() { document.getElementById('media-input').click(); }

        function handleMediaSelect(event) {
            var file = event.target.files[0];
            if (!file) return;
            selectedMediaType = file.type;

            var reader = new FileReader();
            reader.onload = function(e) {
                selectedMediaBase64 = e.target.result;
                var previewContainer = document.getElementById('media-preview');
                previewContainer.classList.remove('hidden');
                
                if (file.type.startsWith('image/')) {
                    previewContainer.innerHTML = '<img src="'+selectedMediaBase64+'" class="h-14 w-14 object-cover rounded-lg border border-gray-700"><button onclick="clearMediaSelection()" class="text-red-400 text-xs p-1"><i class="fa-solid fa-trash"></i></button>';
                } else if (file.type.startsWith('video/')) {
                    previewContainer.innerHTML = '<div class="h-14 w-14 bg-gray-800 rounded-lg flex items-center justify-center border border-gray-700"><i class="fa-solid fa-video text-gray-400"></i></div><button onclick="clearMediaSelection()" class="text-red-400 text-xs p-1"><i class="fa-solid fa-trash"></i></button>';
                }
            };
            reader.readAsDataURL(file);
        }

        function clearMediaSelection() {
            selectedMediaBase64 = null;
            selectedMediaType = null;
            document.getElementById('media-input').value = "";
            document.getElementById('media-preview').classList.add('hidden');
            document.getElementById('media-preview').innerHTML = "";
        }

        function createNewChat() { currentChatId = null; showWelcomeMessage(); loadChatHistory(); clearMediaSelection(); }

        function saveMessageToHistory(role, text) {
            var savedChats = localStorage.getItem("ozone_sessions");
            var sessions = savedChats ? JSON.parse(savedChats) : [];
            var msgObj = { role: role, text: text };

            if (currentChatId === null) {
                currentChatId = "chat_" + Date.now();
                sessions.unshift({ id: currentChatId, title: text.substring(0, 15), messages: [msgObj] });
            } else {
                for (var i = 0; i < sessions.length; i++) {
                    if (sessions[i].id === currentChatId) { sessions[i].messages.push(msgObj); break; }
                }
            }
            localStorage.setItem("ozone_sessions", JSON.stringify(sessions));
            loadChatHistory();
        }

        function loadChatHistory() {
            var historyList = document.getElementById("chat-history-list");
            if (!historyList) return;
            var savedChats = localStorage.getItem("ozone_sessions");
            historyList.innerHTML = "";
            if (savedChats) {
                var sessions = JSON.parse(savedChats);
                sessions.forEach(function(session) {
                    var item = document.createElement("div");
                    item.className = "py-2 px-3 text-gray-400 hover:text-white hover:bg-[#282a2c]/40 text-xs rounded-lg cursor-pointer transition truncate";
                    item.innerText = "💬 " + session.title;
                    item.onclick = function() { openChatSession(session.id); };
                    historyList.appendChild(item);
                });
            }
        }

        function openChatSession(id) {
            currentChatId = id;
            var sessions = JSON.parse(localStorage.getItem("ozone_sessions"));
            var active = sessions.find(function(s) { return s.id === id; });
            if (active) {
                var chatBox = document.getElementById("chat-box");
                chatBox.innerHTML = "";
                active.messages.forEach(function(msg) {
                    var justify = msg.role === "user" ? "flex-end" : "flex-start";
                    var bg = msg.role === "user" ? "bg-[#282a2c]" : "bg-transparent";
                    chatBox.innerHTML += '<div style="display: flex; justify-content: '+justify+'; width: 100%; padding: 4px 0;"><div class="'+bg+' rounded-2xl px-4 py-2.5 text-[15px] max-w-[85%] break-words">'+msg.text+'</div></div>';
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function clearAllHistory() { localStorage.removeItem("ozone_sessions"); createNewChat(); }

        function sendMessage() {
            var inputField = document.getElementById("user-input");
            var chatBox = document.getElementById("chat-box");
            var message = inputField.value.trim();
            if (message === "" && !selectedMediaBase64) return;

            var welcome = document.getElementById("welcome-message");
            if (welcome) welcome.remove();
            
            var userDisplayHTML = '<div style="display: flex; justify-content: flex-end; width: 100%; padding: 4px 0;"><div class="bg-[#282a2c] text-[#e3e3e3] rounded-2xl px-4 py-2.5 text-[15px] max-w-[85%] break-words">';
            if (selectedMediaBase64 && selectedMediaType.startsWith('image/')) {
                userDisplayHTML += '<img src="'+selectedMediaBase64+'" class="max-w-xs max-h-48 rounded-lg mb-2">';
            } else if (selectedMediaBase64 && selectedMediaType.startsWith('video/')) {
                userDisplayHTML += '<div class="text-teal-400 text-sm mb-2"><i class="fa-solid fa-video"></i> Sent a video</div>';
            }
            userDisplayHTML += message + '</div></div>';
            
            chatBox.innerHTML += userDisplayHTML;
            saveMessageToHistory("user", message || "[Media Attachment]");
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            var loadingId = "loading-" + Date.now();
            chatBox.innerHTML += '<div id="'+loadingId+'" class="flex justify-start w-full py-2 animate-pulse"><div class="text-gray-400 text-sm thinking-dots">OzoneAI is thinking</div></div>';
            chatBox.scrollTop = chatBox.scrollHeight;

            var payload = { message: message };
            if (selectedMediaBase64) {
                payload.media = selectedMediaBase64;
                payload.media_type = selectedMediaType;
            }

            clearMediaSelection();

            var xhr = new XMLHttpRequest();
            xhr.open("POST", RENDER_BASE_URL + "/chat", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.timeout = 60000;

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    var loadingEl = document.getElementById(loadingId);
                    if (xhr.status === 200) {
                        if (loadingEl) loadingEl.remove();
                        var data = JSON.parse(xhr.responseText);
                        chatBox.innerHTML += '<div style="display: flex; justify-content: flex-start; width: 100%; padding: 4px 0;"><div class="text-[#e3e3e3] text-[15px] leading-relaxed break-words whitespace-pre-line">'+data.reply+'</div></div>';
                        saveMessageToHistory("ai", data.reply);
                        chatBox.scrollTop = chatBox.scrollHeight;
                    } else {
                        if (loadingEl) loadingEl.remove();
                        chatBox.innerHTML += '<div class="text-red-400 text-xs py-2">⚠️ Connection failed. Please try again.</div>';
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                }
            };
            xhr.send(JSON.stringify(payload));
        }
    </script>
</body>
</html>
