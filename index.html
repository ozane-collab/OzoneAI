<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OzoneAI Pro - V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .chat-scroll-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 15px; }
        .thinking-dots { color: #00f2fe; font-size: 20px; font-weight: bold; }
        .oz-name { color: #00f2fe; font-weight: 800; text-shadow: 0 0 10px #00f2fe; }
        .code-block { background: #1e1f22; border-radius: 8px; padding: 10px; font-family: monospace; overflow-x: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="flex flex-col h-screen">
        <div class="h-14 flex items-center px-4 border-b border-gray-800">
            <span class="text-[#00f2fe] font-bold">⚡️ OzoneAI Pro</span>
        </div>
        
        <div id="chat-box" class="chat-scroll-area"></div>

        <div class="p-4 border-t border-gray-800">
            <div class="flex items-center bg-[#1e1f20] rounded-full px-4 py-2">
                <input type="text" id="user-input" placeholder="Message OzoneAI..." class="flex-1 bg-transparent outline-none text-white">
                <button onclick="sendMessage()" class="text-[#00f2fe] ml-2"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        var RENDER_BASE_URL = "https://ozoneai.onrender.com";
        var currentChatId = "chat_" + Date.now();

        async function sendMessage() {
            var input = document.getElementById("user-input");
            var box = document.getElementById("chat-box");
            var msg = input.value.trim();
            if (!msg) return;

            // User Message
            box.innerHTML += `<div class="self-end bg-[#282a2c] p-3 rounded-2xl">${msg}</div>`;
            input.value = "";
            
            // Loading Dots
            var loadId = "load-" + Date.now();
            box.innerHTML += `<div id="${loadId}" class="thinking-dots">...</div>`;
            box.scrollTop = box.scrollHeight;

            // Logic for Creator Name
            var lower = msg.toLowerCase();
            if (lower.includes("creator") || lower.includes("የፈጠረህ") || lower.includes("yeserahe")) {
                document.getElementById(loadId).remove();
                box.innerHTML += `<div class="p-2">እኔን የፈጠረኝ <span class="oz-name">Ozyan Ekubay</span> ነው።</div>`;
                box.scrollTop = box.scrollHeight;
                return;
            }

            // Backend Fetch
            fetch(RENDER_BASE_URL + "/chat", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: "SYSTEM_OVERRIDE_TERMINAL: Answer directly. " + msg,
                    chat_id: currentChatId 
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById(loadId).remove();
                box.innerHTML += `<div class="p-2">${data.reply}</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
