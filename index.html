<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OzoneAI Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.sidebar-hidden { width: 0px !important; opacity: 0; overflow: hidden; pointer-events: none; }
.sidebar-visible { width: 260px !important; opacity: 1; border-right-width: 1px !important; } 

.thinking-dots::after {
content: '.';
animation: dots 1.5s infinite steps(4);
}
@keyframes dots {
0% { content: ''; }
25% { content: '.'; }
50% { content: '..'; }
75% { content: '...'; }
100% { content: ''; }
} 

.history-item .delete-single-btn { opacity: 0; transition: opacity 0.2s ease; }
.history-item:hover .delete-single-btn { opacity: 1; }
</style>
</head>
<body class="bg-[#131314] text-[#e3e3e3] font-sans h-screen flex overflow-hidden select-none"> 

<div id="sidebar" class="sidebar-hidden bg-[#1e1f20] flex flex-col transition-all duration-300 z-50 h-full relative border-right border-gray-800/60">
<div class="p-5 border-b border-gray-800/40 flex items-center gap-2">
<span class="text-base">⚡️</span>
<span class="text-[#00f2fe] font-semibold text-lg tracking-wide">OzoneAI Pro</span>
</div> 

<div class="flex-1 py-4 flex flex-col gap-1 px-3 overflow-y-auto">
<button onclick="selectMenu('chat')" id="menu-chat" class="w-full bg-[#282a2c] text-white text-[14px] py-3 px-4 rounded-xl transition flex items-center gap-3 font-medium cursor-pointer text-left">
<i class="fa-regular fa-comment-dots text-[#00f2fe]"></i> Chat AI
</button>
<button onclick="selectMenu('photo')" id="menu-photo" class="w-full text-gray-400 hover:text-white hover:bg-[#282a2c]/50 text-[14px] py-3 px-4 rounded-xl transition flex items-center gap-3 cursor-pointer text-left">
<i class="fa-regular fa-image text-purple-400"></i> Photo AI (Image Gen)
</button>
<button onclick="selectMenu('video')" id="menu-video" class="w-full text-gray-400 hover:text-white hover:bg-[#282a2c]/50 text-[14px] py-3 px-4 rounded-xl transition flex items-center gap-3 cursor-pointer text-left mb-2">
<i class="fa-solid fa-clapperboard text-red-400"></i> Video Automation
</button> 

<div class="border-t border-gray-800/60 my-2 pt-2 flex flex-col flex-1">
<div class="flex justify-between items-center px-3 mb-2">
<span class="text-[11px] text-gray-500 font-medium uppercase tracking-wider">Recent Chats</span>
<button onclick="clearAllHistory()" class="text-gray-600 hover:text-red-400 text-xs transition cursor-pointer" title="Clear All History">
<i class="fa-regular fa-trash-can"></i>
</button>
</div>
<div id="chat-history-list" class="flex flex-col gap-1 overflow-y-auto max-h-[300px]"></div>
</div> 

<div class="mt-auto border-t border-gray-800/40 pt-4">
<button onclick="selectMenu('ultimate')" id="menu-ultimate" class="w-full text-gray-400 hover:text-white hover:bg-[#282a2c]/50 text-[13px] py-3 px-4 rounded-xl transition flex items-center gap-3 cursor-pointer text-left">
<i class="fa-solid fa-wand-magic-sparkles"></i> Ultimate AI Assistant
</button>
</div>
</div>
</div> 

<div class="flex-1 flex flex-col relative bg-[#131314] h-full"> 

<div class="h-14 flex items-center px-4 justify-between bg-[#131314]">
<div class="flex items-center gap-3">
<button onclick="toggleSidebar()" class="text-gray-400 hover:text-white text-lg cursor-pointer transition p-2 rounded-full hover:bg-gray-800/50">
<i class="fa-solid fa-ellipsis-vertical"></i>
</button>
<div class="text-[#00f2fe] text-sm tracking-wide flex items-center gap-1.5 font-semibold">
<span>⚡️</span>
<span id="top-branding-text">ozoneaipro</span>
</div>
</div>
<button onclick="createNewChat()" class="text-xs bg-[#1e1f20] hover:bg-[#282a2c] text-teal-400 px-3 py-1.5 rounded-full border border-gray-800 font-medium transition cursor-pointer flex items-center gap-1.5">
<i class="fa-solid fa-plus text-[10px]"></i> New Chat
</button>
</div> 

<div id="chat-box" class="flex-1 overflow-y-auto px-4 md:px-8 py-4 space-y-6 flex flex-col max-w-3xl w-full mx-auto">
</div> 

<div class="p-4 bg-[#131314]">
<div class="max-w-3xl mx-auto flex items-center bg-[#1e1f20] rounded-full px-5 py-2.5 focus-within:bg-[#28292a] transition-all duration-200 border border-transparent focus-within:border-gray-800">
<input type="text" id="user-input" placeholder="Message OzoneAI..." class="flex-1 bg-transparent border-none outline-none text-[#e3e3e3] placeholder-[#808082] text-[15px] py-1" autocomplete="off">
<button id="send-btn" onclick="sendMessage()" class="text-gray-400 hover:text-[#00f2fe] w-9 h-9 rounded-full transition flex items-center justify-center cursor-pointer hover:bg-gray-800/40 ml-2">
<i class="fa-solid fa-paper-plane text-sm"></i>
</button>
</div>
<div class="text-center text-[11px] text-gray-500 mt-2">OzoneAI may display inaccurate info, so double-check its responses.</div>
</div>
</div> 

<script>
var currentChatId = null;
var currentMode = 'chat'; 

window.onload = function() {
var inputElement = document.getElementById("user-input");
inputElement.onkeydown = function(event) {
if (event.keyCode === 13 || event.key === "Enter") {
event.preventDefault();
sendMessage();
}
};
loadChatHistory();
showWelcomeMessage();
}; 

function toggleSidebar() {
var sidebar = document.getElementById("sidebar");
if (sidebar.className.indexOf("sidebar-hidden") !== -1) {
sidebar.className = sidebar.className.replace("sidebar-hidden", "sidebar-visible");
} else {
sidebar.className = sidebar.className.replace("sidebar-visible", "sidebar-hidden");
}
} 

function showWelcomeMessage() {
var title = "OzoneAI";
var subtitle = "How can I help you today?";
var placeholder = "Message OzoneAI..."; 

if (currentMode === 'photo') {
title = "Ozone Photo AI";
subtitle = "ምስል ለመፍጠር የፈለጉትን በአማርኛ ወይም በእንግሊዘኛ ይጻፉልኝ (ለምሳሌ: ሀብታም የኢትዮጵያ ከተማ)...";
placeholder = "Describe the image you want to generate...";
} else if (currentMode === 'video') {
title = "Ozone Video Automation";
subtitle = "ለቪዲዮ የሚሆን ሙሉ ስክሪፕትና መዋቅር ለማውጣት ርዕስ ስጠኝ...";
placeholder = "Enter video topic or concept...";
} 

document.getElementById("user-input").placeholder = placeholder;
document.getElementById("chat-box").innerHTML = 

'<div id="welcome-message" class="my-auto text-left pl-2">' +
'<h1 class="text-4xl font-bold text-[#00f2fe] tracking-tight mb-2 flex items-center gap-2">' +
'<span>⚡️</span>' +
'<span>' + title + '</span>' +
'</h1>' +
'<h2 class="text-2xl font-medium text-[#e3e3e3]/80 tracking-tight">' + subtitle + '</h2>' +
'</div>';
} 

function createNewChat() {
currentChatId = null;
showWelcomeMessage();
loadChatHistory();
} 

function selectMenu(menuType) {
currentMode = menuType;
var menus = ['chat', 'photo', 'video', 'ultimate'];
menus.forEach(function(m) {
var el = document.getElementById('menu-' + m);
if (el) {
if (m === menuType) {
el.className = "w-full bg-[#282a2c] text-white text-[14px] py-3 px-4 rounded-xl transition flex items-center gap-3 font-medium cursor-pointer text-left";
} else {
el.className = "w-full text-gray-400 hover:text-white hover:bg-[#282a2c]/50 text-[14px] py-3 px-4 rounded-xl transition flex items-center gap-3 cursor-pointer text-left";
}
}
});
document.getElementById("top-branding-text").innerText = "ozoneai_" + menuType;
createNewChat();
} 

function saveMessageToHistory(role, text, imageUrl) {
var savedChats = localStorage.getItem("ozone_sessions");
var sessions = savedChats ? JSON.parse(savedChats) : []; 

var msgObj = { role: role, text: text };
if (imageUrl) msgObj.image = imageUrl; 

if (currentChatId === null) {
currentChatId = "chat_" + Date.now();
var newSession = {
id: currentChatId,
mode: currentMode,
title: "[" + currentMode.toUpperCase() + "] " + text.substring(0, 15),
messages: [msgObj]
};
sessions.unshift(newSession);
} else {
for (var i = 0; i < sessions.length; i++) {
if (sessions[i].id === currentChatId) {
sessions[i].messages.push(msgObj);
break;
}
}
}
localStorage.setItem("ozone_sessions", JSON.stringify(sessions));
loadChatHistory();
} 

function loadChatHistory() {
var historyList = document.getElementById("chat-history-list");
var savedChats = localStorage.getItem("ozone_sessions");
historyList.innerHTML = ""; 

if (savedChats) {
var sessions = JSON.parse(savedChats);
if (sessions.length > 0) {
sessions.forEach(function(session) {
var displayTitle = session.title;
if (displayTitle.length > 20) {
displayTitle = displayTitle.substring(0, 18) + "...";
} 

var isActive = session.id === currentChatId ? "bg-[#282a2c]/60 text-white" : "text-gray-400"; 

var item = document.createElement("div");
item.className = "history-item " + isActive + " hover:text-white hover:bg-[#282a2c]/40 text-[13px] py-2 px-3 rounded-lg cursor-pointer transition flex items-center justify-between group truncate";
item.setAttribute("onclick", "openChatSession('" + session.id + "')"); 

item.innerHTML =
'<div class="flex items-center gap-2 truncate flex-1">' +
'<i class="fa-regular fa-message text-xs text-gray-500"></i>' +
'<span class="truncate">' + displayTitle + '</span>' +
'</div>' +
'<button onclick="deleteSingleHistory(\'' + session.id + '\', event)" class="delete-single-btn text-gray-500 hover:text-red-400 p-1 rounded transition ml-1" title="Delete chat">' +
'<i class="fa-solid fa-xmark text-xs"></i>' +
'</button>'; 

historyList.appendChild(item);
});
return;
}
}
historyList.innerHTML = '<div class="text-xs text-gray-500 italic px-3 py-1">No recent chats</div>';
} 

function openChatSession(id) {
currentChatId = id;
var savedChats = localStorage.getItem("ozone_sessions");
if (!savedChats) return; 

var sessions = JSON.parse(savedChats);
var activeSession = sessions.find(function(s) { return s.id === id; }); 

if (activeSession) {
currentMode = activeSession.mode;
var chatBox = document.getElementById("chat-box");
chatBox.innerHTML = ""; 

activeSession.messages.forEach(function(msg) {
if (msg.role === "user") {
chatBox.innerHTML +=
'<div class="flex justify-end w-full">' +
'<div class="bg-[#282a2c] text-[#e3e3e3] rounded-2xl px-4 py-2.5 text-[15px] max-w-[85%] break-words shadow-sm">' + msg.text + '</div>' +
'</div>';
} else {
var imgHtml = msg.image ? '<img src="' + msg.image + '" class="mt-3 rounded-xl max-w-sm w-full border border-gray-800 shadow-md" />' : '';
chatBox.innerHTML +=
'<div class="flex justify-start w-full pl-1">' +
'<div class="text-[#e3e3e3] text-[15px] max-w-full leading-relaxed break-words whitespace-pre-line">' +
msg.text + imgHtml +
'</div>' +
'</div>';
}
});
chatBox.scrollTop = chatBox.scrollHeight;
loadChatHistory();
}
} 

function deleteSingleHistory(id, event) {
event.stopPropagation();
var savedChats = localStorage.getItem("ozone_sessions");
if (savedChats) {
var sessions = JSON.parse(savedChats);
var updatedSessions = sessions.filter(function(s) { return s.id !== id; });
localStorage.setItem("ozone_sessions", JSON.stringify(updatedSessions));
if (currentChatId === id) createNewChat();
else loadChatHistory();
}
} 

function clearAllHistory() {
if(confirm("Are you sure you want to clear all chat history?")) {
localStorage.removeItem("ozone_sessions");
createNewChat();
}
} 

// Free Google Translation Engine integration for accurate Amharic handling
async function translateAmharicToEnglish(text) {
try {
var url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=am&tl=en&dt=t&q=" + encodeURIComponent(text);
let res = await fetch(url);
let data = await res.json();
if (data && data[0] && data[0][0]) {
return data[0][0][0];
}
return text;
} catch (e) {
return text;
}
} 

async function sendMessage() {
var inputField = document.getElementById("user-input");
var chatBox = document.getElementById("chat-box");
var message = inputField.value.trim(); 

if (message === "") return; 

var welcome = document.getElementById("welcome-message");
if (welcome) welcome.remove(); 

chatBox.innerHTML +=
'<div class="flex justify-end w-full">' +
'<div class="bg-[#282a2c] text-[#e3e3e3] rounded-2xl px-4 py-2.5 text-[15px] max-w-[85%] break-words shadow-sm">' + message + '</div>' +
'</div>'; 

saveMessageToHistory("user", message);
inputField.value = "";
chatBox.scrollTop = chatBox.scrollHeight; 

var loadingId = "loading-" + Date.now();
chatBox.innerHTML +=
'<div id="' + loadingId + '" class="flex justify-start w-full pl-1 animate-pulse">' +
'<div class="text-gray-400 text-xl font-bold tracking-widest thinking-dots"></div>' +
'</div>';
chatBox.scrollTop = chatBox.scrollHeight; 

// Handle Photo Generation Logic directly inside Frontend for faster rendering and stability
if (currentMode === 'photo') {
var processingMessage = message;
var isAmharic = /[\u1200-\u137F]/.test(message); 

if (isAmharic) {
processingMessage = await translateAmharicToEnglish(message);
} 

var cleanPrompt = processingMessage.replace(/(photo|image|generate|picture|create|of|draw|ፎቶ|ስራ|ስራሊኝ|አምጣልኝ|ሳልልኝ|እባክህ|እባክሽ)/gi, "").trim();
if(cleanPrompt === "") cleanPrompt = "beautiful high resolution concept art futuristic layout"; 

var generatedImageUrl = "https://image.pollinations.ai/p/" + encodeURIComponent(cleanPrompt) + "?width=1024&height=1024&nologo=true&seed=" + Math.floor(Math.random() * 100000); 

var loadingEl = document.getElementById(loadingId);
if (loadingEl) loadingEl.remove(); 

var replyMessage = isAmharic ? "✨ የፈለጉት ምስል በጥራት ተዘጋጅቷል፦" : "✨ Here is your generated photo:"; 

chatBox.innerHTML +=
'<div class="flex justify-start w-full pl-1">' +
'<div class="text-[#e3e3e3] text-[15px] max-w-full leading-relaxed break-words">' +
'<div>' + replyMessage + '</div>' +
'<img src="' + generatedImageUrl + '" class="mt-3 rounded-xl max-w-sm w-full border border-gray-800 shadow-xl" alt="Ozone AI Image" />' +
'</div>' +
'</div>'; 

saveMessageToHistory("ai", replyMessage, generatedImageUrl);
chatBox.scrollTop = chatBox.scrollHeight;
return;
} 

// Standard Server Chat Routing
var endpoint = "http://localhost:8000/api/chat";
if (currentMode === 'video') endpoint = "http://localhost:8000/api/video";
if (currentMode === 'ultimate') endpoint = "http://localhost:8000/api/chat"; 

var xhr = new XMLHttpRequest();
xhr.open("POST", endpoint, true);
xhr.setRequestHeader("Content-Type", "application/json"); 

xhr.onreadystatechange = function() {
if (xhr.readyState === 4) {
var loadingEl = document.getElementById(loadingId);
if (loadingEl) loadingEl.remove(); 

if (xhr.status === 200) {
var data = JSON.parse(xhr.responseText);
var imgHtml = data.image ? '<img src="' + data.image + '" class="mt-3 rounded-xl max-w-sm w-full border border-gray-800 shadow-lg" />' : ''; 

chatBox.innerHTML +=
'<div class="flex justify-start w-full pl-1">' +
'<div class="text-[#e3e3e3] text-[15px] max-w-full leading-relaxed break-words whitespace-pre-line">' +
data.reply + imgHtml +
'</div>' +
'</div>';
saveMessageToHistory("ai", data.reply, data.image);
} else {
chatBox.innerHTML +=
'<div class="flex justify-start w-full pl-1">' +
'<div class="bg-red-950/20 text-red-400/90 text-xs rounded-xl px-4 py-2 border border-red-900/30">⚠️ Connection failed. Check Python server.</div>' +
'</div>';
}
chatBox.scrollTop = chatBox.scrollHeight;
}
};
xhr.send(JSON.stringify({ message: message }));
}
</script>
</body>
</html>
