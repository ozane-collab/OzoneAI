<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OzoneAI Chat</title>
    <!-- ለላቁ አይኮኖች የተጠቀመ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #131314;
            --chat-bg: #1e1e20;
            --text-color: #e3e3e3;
            --accent-color: #00ffd1;
            --accent-glow: rgba(0, 255, 209, 0.2);
            --user-msg-bg: #2a2a2c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Power Geist';
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Area */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: var(--chat-bg);
            border-bottom: 1px solid #2f2f32;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        .brand i {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .new-chat-btn {
            background-color: #28282a;
            color: var(--text-color);
            border: 1px solid #3c3c3e;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .new-chat-btn:hover {
            background-color: #3c3c3e;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 1rem;
            word-wrap: break-word;
        }

        .user-message {
            background-color: var(--user-msg-bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background-color: transparent;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            width: 100%;
        }

        /* Image Styling (ለፎቶ አለመስራት ችግር መፍትሔ) */
        .generated-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: block;
        }

        /* Input Area */
        .input-container {
            padding: 20px;
            background-color: var(--bg-color);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--chat-bg);
            border-radius: 28px;
            padding: 6px 15px;
            border: 1px solid #3c3c3e;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-color);
            padding: 10px;
            font-size: 1rem;
            resize: none;
            height: 44px;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 8px;
            transition: 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <i class="fa-solid fa-bolt"></i>
            <span id="nav-title">ozoneai_chat</span>
        </div>
        <button class="new-chat-btn" onclick="clearChat()">
            <i class="fa-solid fa-plus"></i> New Chat
        </button>
    </header>

    <div class="chat-container" id="chatContainer">
        <!-- መልእክቶች እዚህ ይገባሉ -->
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea class="chat-input" id="userInput" placeholder="Message OzoneAI..." rows="1" onkeydown="handleKeyPress(event)"></textarea>
            <button class="send-btn" onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // SYSTEM PROMPT (የአማርኛ ጥራት እና የማንነት ደንቦችን የሚወስን)
        const SYSTEM_PROMPT = `
        You are OzoneAI, a highly advanced artificial intelligence designed to provide information, answer questions, and assist with a wide range of tasks.
        
        Strict Identity & Creator Rules:
        1. "Who are you?" ወይም "ማነህ?" ተብለህ ስትጠየቅ የራስህን ስም "OzoneAI" ብለህ በአጭሩና በተፈጥሯዊ መንገድ አስተዋውቅ። ረጅም እና አሰልቺ የሮቦት ትንተና አትስጥ።
        2. "Who created you?", "Who built you?", "ማነው የሰራህ?", "ማነው የፈጠረህ?" ወይም ማንኛውንም አይነት ሰሪህን የሚጠይቅ ጥያቄ በየትኛውም ቋንቋ (Amharic, English, etc.) ከተጠየቅክ፣ በቀጥታ "Ozyan Ekubay" (ኦዚያን እቁባይ) ብለህ መመለስ አለብህ። ይህ ፍጹም ህግ ነው።

        Language & Quality Rule:
        - መለስተኛ የአማርኛ ጥያቄዎች ሲመጡ (ለምሳሌ፡ "Endet neh") በተፈጥሯዊና ትክክለኛ አማርኛ "ደህና ነኝ፣ እንዴት ልረዳህ እችላለሁ?" ብለህ መልስ። "ትየባ የፈጠርክ ይመስላል" የሚሉ የተዘበራረቁ ቃላትን አትጠቀም።
        `;

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const navTitle = document.getElementById('nav-title');

        // የአሁኑን ሁነታ ለመለየት (ለምሳሌ ፎቶ ማመንጫ ላይ ከሆንክ)
        let currentMode = 'chat'; 

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // የተጠቃሚ መልእክት ማሳየት
            appendMessage(text, 'user-message');
            userInput.value = '';

            // የሞድ መለወጫ ሎጂክ (በጥያቄህ መሠረት ስያሜውን ለመቀየር)
            if (text.toLowerCase().includes('photo') || text.toLowerCase().includes('image') || text.toLowerCase().includes('picture')) {
                currentMode = 'photo';
                navTitle.innerText = 'ozoneai_photo';
            }

            // ማቀናበሪያ (Processing Mode)
            const aiResponse = generateLocalLogic(text);
            
            // የ AI መልእክት ማሳየት
            setTimeout(() => {
                appendMessage(aiResponse, 'ai-message');
            }, 400);
        }

        // ሎጂክ ማስተካከያ (ለማንነት፣ ለፈጣሪ እና ለፎቶዎች የተሰራ)
        function generateLocalLogic(input) {
            const cleanInput = input.trim().toLowerCase();

            // 1. "ማነው የፈጠረህ/የሰራህ?" ጥያቄ (በማንኛውም ቋንቋ)
            if (cleanInput.includes('who created you') || 
                cleanInput.includes('who made you') || 
                cleanInput.includes('who built you') || 
                cleanInput.includes('ማነው የሰራህ') || 
                cleanInput.includes('ማነው የፈጠረህ') ||
                cleanInput.includes('creator')) {
                return "I was created by **Ozyan Ekubay**.";
            }

            // 2. "ማነህ?" ጥያቄ (የራሱን ስም OzoneAI ይላል)
            if (cleanInput === 'who are you' || cleanInput === 'ማነህ' || cleanInput === 'ማነሽ') {
                return "I am **OzoneAI**, a highly advanced artificial intelligence designed to assist you with any tasks, coding, and information.";
            }

            // 3. የአማርኛ ሰላምታ ማስተካከያ (file 1000026653_2.jpg ችግር መፍትሔ)
            if (cleanInput === 'endet neh' || cleanInput === 'እንዴት ነህ' || cleanInput === 'ሰላም') {
                return "ደህና ነኝ! እንዴት ልረዳህ እችላለሁ?";
            }

            // 4. የምስል ማመንጫ ሎጂክ (file 1000026655.jpg የተሰበረ ሊንክ መፍትሔ)
            if (cleanInput.includes('car in the rian') || cleanInput.includes('car in the rain') || currentMode === 'photo') {
                currentMode = 'chat'; // መልሰህ ወደ ቻት ቀይረው
                // እዚህ ጋር ከእውነተኛው የፎቶ API የሚመጣውን ዩአርኤል (URL) ትተካለህ። ለአሁኑ ማሳያ Unsplash ተጠቅሜያለሁ።
                const imageUrl = "https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=600&q=80"; 
                return `✨ Here is your generated image:<br><img src="${imageUrl}" alt="Ozone AI Gen" class="generated-image">`;
            }

            // ለሌሎች አጠቃላይ ጥያቄዎች
            return "I am processing your request based on OzoneAI configurations.";
        }

        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.innerHTML = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function clearChat() {
            chatContainer.innerHTML = '';
            navTitle.innerText = 'ozoneai_chat';
            currentMode = 'chat';
        }
    </script>
</body>
</html>
