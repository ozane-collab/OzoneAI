<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OzoneAI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { margin: 0; padding: 0; height: 100vh; width: 100%; background-color: #131314; color: #e3e3e3; font-family: sans-serif; overflow: hidden; }
        .sidebar-hidden { transform: translateX(-100%); }
        .sidebar-visible { transform: translateX(0); }
    </style>
</head>
<body class="bg-[#131314] text-[#e3e3e3]">

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar-hidden md:sidebar-visible fixed bg-[#1e1f20] h-full w-[260px] border-r border-gray-800 z-50 transition-all">
        <div class="p-5 font-bold text-[#00f2fe]">OzoneAI Pro</div>
        <div class="px-3 flex flex-col gap-2">
            <!-- ⚡️ ጠቃሚ ማስተካከያ፡ onclick የሚሰሩ መሆናቸውን አረጋግጫለሁ -->
            <button onclick="selectMenu('chat')" class="w-full bg-[#282a2c] p-3 rounded-lg text-left">Chat AI</button>
            <button onclick="selectMenu('photo')" class="w-full hover:bg-[#282a2c] p-3 rounded-lg text-left">Photo AI</button>
            <button onclick="selectMenu('video')" class="w-full hover:bg-[#282a2c] p-3 rounded-lg text-left">Video AI</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="flex flex-col h-full w-full">
        <div class="h-14 flex items-center px-4 border-b border-gray-800">
            <button onclick="toggleSidebar()" class="text-white p-2">☰</button>
            <span class="ml-4 font-bold" id="mode-title">OzoneAI Chat</span>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- መልእክቶች እዚህ ይገባሉ -->
        </div>

        <div class="p-4 bg-[#131314]">
            <div class="flex bg-[#1e1f20] rounded-full p-2 border border-gray-700">
                <input type="text" id="user-input" placeholder="Message OzoneAI..." class="flex-1 bg-transparent px-4 outline-none">
                <button onclick="sendMessage()" class="bg-[#00f2fe] text-black px-6 py-2 rounded-full font-bold">Send</button>
            </div>
        </div>
    </div>

    <script>
        var RENDER_BASE_URL = "https://ozoneai.onrender.com";
        var currentMode = 'chat';

        // 🛠 አዲስ የሜኑ መቀያየሪያ ተግባር
        function selectMenu(mode) {
            currentMode = mode;
            document.getElementById('mode-title').innerText = "OzoneAI " + mode.toUpperCase();
            document.getElementById('chat-box').innerHTML = ""; // ቻቱን ማጽጃ
            toggleSidebar(); // ስልክ ላይ ሜኑ እንዲዘጋ
        }

        function toggleSidebar() {
            var s = document.getElementById('sidebar');
            s.classList.toggle('sidebar-hidden');
        }

        // 🚀 የ Hi/Bye መልእክት የሚልክ ዋናው ተግባር
        function sendMessage() {
            var input = document.getElementById('user-input');
            var msg = input.value.trim();
            if(!msg) return;

            // 1. በቻት ቦክስ ላይ ማሳያ
            var box = document.getElementById('chat-box');
            box.innerHTML += `<div class="text-right p-2"><span class="bg-[#282a2c] p-2 rounded-lg">${msg}</span></div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            // 2. ለባክኤንድ መላኪያ
            fetch(RENDER_BASE_URL + "/" + currentMode, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            })
            .then(res => res.json())
            .then(data => {
                box.innerHTML += `<div class="text-left p-2"><span class="bg-gray-800 p-2 rounded-lg">${data.reply}</span></div>`;
                box.scrollTop = box.scrollHeight;
            })
            .catch(err => {
                box.innerHTML += `<div class="text-red-500 p-2">Error: Server offline</div>`;
            });
        }
    </script>
</body>
</html>
